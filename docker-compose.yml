services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REPO_URL: https://github.com/CoderXYZ7/AnimaID.git
        BRANCH: master
    ports:
      - "8080:80"
    environment:
      APP_ENV: development
      APP_DEBUG: "false"
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      CORS_ORIGINS: http://localhost:8080
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@animaid.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
    volumes:
      # Persist database and uploads across container restarts
      - animaid_db:/var/www/html/database
      - animaid_uploads:/var/www/html/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  animaid_db:
  animaid_uploads:
